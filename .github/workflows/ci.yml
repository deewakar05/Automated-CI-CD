# =========================================================================
# GitHub Actions CI/CD Pipeline - Node.js Express Application
# =========================================================================
name: Node.js CI/CD Pipeline

on:
  # Trigger the workflow on push events to main or demo branches
  push:
    branches: [ main, demo ]
  # Trigger the workflow on pull requests targeting main or demo branches
  pull_request:
    branches: [ main, demo ]
  # Allows manual triggering of the workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ci:
    name: Build, Test and Publish Node Container
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository source code onto the GitHub Actions runner host
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Provision a clean Node.js runtime environment on the runner
      # Includes 'cache: npm' which automatically caches dependencies in ~/.npm to accelerate future runs
      - name: Set up Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # Step 3: Install precise production and development packages using package-lock.json
      - name: Install Node.js Dependencies
        run: npm ci

      # Step 4: Execute Jest unit and integration tests (validates GET / and GET /health)
      - name: Run Jest & Supertest Tests
        run: npm test

      # Step 5: Authenticate with Docker Hub using securely stored Repository Secrets
      # Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to be configured in your GitHub Repo Settings
      - name: Login to Docker Hub Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 6: Determine proper Docker Tag conventions depending on the git branch being built
      # If building the 'main' branch, sets tag as 'latest' and a unique commit-sha tag
      # If building another branch (e.g. 'demo'), uses branch name prefix tag (e.g. 'demo-latest')
      - name: Formulate Docker Image Tags
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

          if [ "$BRANCH_NAME" = "main" ]; then
            echo "TAG_LATEST=latest" >> $GITHUB_ENV
            echo "TAG_SHA=main-${GITHUB_SHA}" >> $GITHUB_ENV
          else
            echo "TAG_LATEST=${BRANCH_NAME}-latest" >> $GITHUB_ENV
            echo "TAG_SHA=${BRANCH_NAME}-${GITHUB_SHA}" >> $GITHUB_ENV
          fi

      # Step 7: Compile and build the Docker container image utilizing the root Dockerfile
      # Tags the image with both the semantic branch-name 'latest' tag and the commit-specific SHA tag
      - name: Build Docker Container Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline:${{ env.TAG_LATEST }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline:${{ env.TAG_SHA }} .

      # Step 8: Push the completed container images up to public Docker Hub Registry
      - name: Push Container Images to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline:${{ env.TAG_LATEST }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline:${{ env.TAG_SHA }}
